{% extends "base.html" %}

{% block title %}Inicio{% endblock %}

{% block content %}
<!-- Stats Row -->
<div class="dashboard-stats">
    <!-- Sales -->
    <div class="stat-card-compact">
        <div class="stat-icon" style="background: rgba(14, 165, 233, 0.1); color: var(--secondary-color);">
            <i class='bx bx-dollar-circle'></i>
        </div>
        <div class="stat-info">
            <h4>Ventas Hoy</h4>
            <div class="value" id="today-sales">$0.00</div>
        </div>
    </div>
    <!-- Items -->
    <div class="stat-card-compact">
        <div class="stat-icon" style="background: rgba(99, 102, 241, 0.1); color: var(--primary-color);">
            <i class='bx bx-shopping-bag'></i>
        </div>
        <div class="stat-info">
            <h4>Artículos</h4>
            <div class="value" id="items-sold">0</div>
        </div>
    </div>
    <!-- Low Stock -->
    <div class="stat-card-compact">
        <div class="stat-icon" style="background: rgba(239, 68, 68, 0.1); color: var(--error-color);">
            <i class='bx bx-error-circle'></i>
        </div>
        <div class="stat-info">
            <h4>Stock Bajo</h4>
            <div class="value" id="low-stock" style="color: var(--error-color)">0</div>
        </div>
    </div>
</div>

<div class="dashboard-grid">
    <!-- Quick Actions -->
    <div>
        <h3 class="section-title"><i class='bx bx-bolt-circle'></i> Accesos Rápidos</h3>
        <div class="actions-grid">
            <a href="/pos" class="action-tile">
                <i class='bx bxs-cart-add'></i>
                <span>Nueva Venta</span>
            </a>
            <a href="/inventory" class="action-tile">
                <i class='bx bxs-box'></i>
                <span>Inventario</span>
            </a>
            <a href="/sales" class="action-tile">
                <i class='bx bxs-report'></i>
                <span>Historial</span>
            </a>
            <a href="/categories" class="action-tile">
                <i class='bx bxs-category'></i>
                <span>Categorías</span>
            </a>
        </div>
    </div>

    <!-- Recent Activity -->
    <div>
        <h3 class="section-title"><i class='bx bx-time-five'></i> Actividad Reciente</h3>
        <div class="recent-list" id="recent-sales-list">
            <div class="recent-item text-secondary" style="justify-content: center;">Cargando...</div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    document.addEventListener('DOMContentLoaded', async () => {
        // Load Stats
        try {
            const stats = await api.getDashboardStats();
            document.getElementById('today-sales').textContent = formatCurrency(stats.today_sales);
            document.getElementById('items-sold').textContent = stats.items_sold;
            document.getElementById('low-stock').textContent = stats.low_stock;
        } catch (error) {
            console.error('Error loading stats:', error);
        }

        // Load Recent Sales
        try {
            const sales = await api.getSales();
            const recent = sales.slice(0, 5);
            const container = document.getElementById('recent-sales-list');

            if (recent.length === 0) {
                container.innerHTML = '<div class="recent-item text-secondary" style="justify-content: center;">No hay ventas recientes</div>';
                return;
            }

            container.innerHTML = recent.map(sale => `
                <div class="recent-item">
                    <div>
                        <div class="recent-id">#${sale.id}</div>
                        <small class="text-secondary">${new Date(sale.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}</small>
                    </div>
                    <div class="recent-amount">${formatCurrency(sale.total_amount)}</div>
                </div>
            `).join('');
        } catch (error) {
            console.error('Error loading recent sales:', error);
        }
    });
</script>
{% endblock %}
