<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Tienda PoS</title>
    <!-- Local Fonts and Icons -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/fonts.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='vendor/boxicons/css/boxicons.min.css') }}">

    <!-- Local Styles (Base/Components) -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

    <!-- Tailwind CSS (Utilities - Must come last to override) -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/tailwind.css') }}">

</head>

<body class="flex min-h-screen overflow-x-hidden bg-gray-50">
    <nav class="sidebar z-50">
        <div class="brand">
            <i class='bx bxs-store'></i>
            Mi Tienda
        </div>
        <ul class="nav-links">
            <li><a href="/" class="{{ 'active' if request.path == '/' else '' }}">
                    <i class='bx bxs-dashboard'></i> Inicio
                </a></li>
            <li><a href="/pos" class="{{ 'active' if request.path == '/pos' else '' }}">
                    <i class='bx bxs-cart-alt'></i> Punto de Venta
                </a></li>
            <li><a href="/inventory" class="{{ 'active' if request.path == '/inventory' else '' }}">
                    <i class='bx bxs-box'></i> Inventario
                </a></li>
            <li><a href="/categories" class="{{ 'active' if request.path == '/categories' else '' }}">
                    <i class='bx bxs-category'></i> Categorías
                </a></li>
            <li><a href="/sales" class="{{ 'active' if request.path == '/sales' else '' }}">
                    <i class='bx bxs-report'></i> Historial
                </a></li>
        </ul>
    </nav>

    <main class="main-content flex-1 relative">
        <header>
            <h1>{% block title %}Inicio{% endblock %}</h1>
            <div class="user-profile">
                <i class='bx bxs-user-circle' style="font-size: 1.2rem;"></i>
                <span>Administrador</span>
            </div>
        </header>

        {% block content %}{% endblock %}
    </main>

    {% block modals %}{% endblock %}

    <script src="{{ url_for('static', filename='script.js') }}?v={{ range(1, 10000) | random }}"></script>
    {% block scripts %}{% endblock %}
</body>

</html>
