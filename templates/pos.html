{% extends "base.html" %}

{% block title %}Punto de Venta{% endblock %}

{% block content %}
<div class="pos-layout">
    <!-- Left Side: Products -->
    <div class="flex flex-col h-full overflow-hidden" style="display: flex; flex-direction: column; height: 100%;">
        <!-- Header / Stats / Filters -->
        <div class="mb-2">
            <div class="pos-header-stats justify-between"
                style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; background: #fff; padding: 1rem; border-radius: var(--radius); border: 1px solid var(--border-color);">
                <div class="flex gap-4" style="display: flex; gap: 1.5rem;">
                    <div class="pos-stat-item" style="display: flex; align-items: center; gap: 0.75rem;">
                        <div class="stat-icon"
                            style="background: rgba(99, 102, 241, 0.1); color: var(--primary-color); padding: 0.5rem; border-radius: 8px;">
                            <i class='bx bx-dollar-circle' style="font-size: 1.5rem;"></i>
                        </div>
                        <div>
                            <span class="block text-xs text-secondary" style="display: block; font-size: 0.8rem;">Ventas
                                Hoy</span>
                            <strong id="pos-today-sales" class="text-primary" style="font-size: 1.1rem;">Bs
                                0.00</strong>
                        </div>
                    </div>
                    <div class="pos-stat-item" style="display: flex; align-items: center; gap: 0.75rem;">
                        <div class="stat-icon"
                            style="background: rgba(14, 165, 233, 0.1); color: var(--secondary-color); padding: 0.5rem; border-radius: 8px;">
                            <i class='bx bx-shopping-bag' style="font-size: 1.5rem;"></i>
                        </div>
                        <div>
                            <span class="block text-xs text-secondary"
                                style="display: block; font-size: 0.8rem;">Items</span>
                            <strong id="pos-items-sold" style="font-size: 1.1rem;">0</strong>
                        </div>
                    </div>
                </div>
                <div class="date-selector">
                    <input type="date" id="saleDate" class="form-control"
                        style="padding: 0.5rem 1rem; border: 1px solid var(--border-color); border-radius: var(--radius);">
                </div>
            </div>

            <div class="flex gap-2 mb-2" style="margin-bottom: 1rem;">
                <div class="search-wrapper w-full relative" style="width: 100%; position: relative;">
                    <i class='bx bx-search'
                        style="position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: var(--text-light); font-size: 1.2rem;"></i>
                    <input type="text" id="searchBox" placeholder="Buscar productos por nombre o SKU..."
                        onkeyup="filterProducts()" style="padding-left: 3rem; width: 100%;">
                </div>
            </div>

            <div id="categoryFilters" class="category-filters"
                style="display: flex; gap: 0.5rem; overflow-x: auto; padding-bottom: 0.5rem;">
                <!-- Populated by JS -->
            </div>
        </div>

        <!-- Products Grid -->
        <div id="productsContainer"
            class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-4 p-1 pb-20 overflow-y-auto flex-1 custom-scrollbar">
            <!-- Populated by JS -->
        </div>
    </div>

    <!-- Right Side: Cart -->
    <div class="cart-panel">
        <div class="cart-header">
            <div class="flex justify-between items-center">
                <h3><i class='bx bx-cart'></i> Carrito Actual</h3>
                <button onclick="cart = []; renderCart();" class="text-secondary hover:text-danger"
                    style="background: none; border: none; cursor: pointer; font-size: 0.9rem;">
                    <i class='bx bx-trash'></i> Limpiar
                </button>
            </div>
        </div>

        <div id="cartItems" class="cart-items">
            <!-- Populated by JS -->
        </div>

        <div class="cart-footer">
            <div class="flex justify-between mb-1">
                <span class="text-secondary">Subtotal</span>
                <span id="cartSubtotal" class="font-bold">Bs 0.00</span>
            </div>
            <div class="cart-total flex justify-between items-center mb-4" style="margin-bottom: 1.5rem;">
                <span style="font-size: 1.1rem; font-weight: 500; color: var(--text-primary);">Total a Pagar</span>
                <span id="cartTotal">Bs 0.00</span>
            </div>

            <button onclick="processCheckout()" class="btn btn-primary btn-checkout"
                style="width: 100%; justify-content: center; font-size: 1.1rem; padding: 1rem;">
                <i class='bx bx-check-circle'></i> Completar Venta
            </button>
        </div>
    </div>
</div>

<!-- Toast Container -->
<div id="toastContainer" class="toast-container"></div>
{% endblock %}

{% block scripts %}
<script>
    let allProducts = [];
    let cart = [];
    let activeCategory = 'all';

    // Gradients for cards based on index/hash to be consistent but varied
    const gradients = [
        'linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%)', // Indigo-Purple
        'linear-gradient(135deg, #3b82f6 0%, #0ea5e9 100%)', // Blue-Sky
        'linear-gradient(135deg, #10b981 0%, #34d399 100%)', // Emerald-Teal
        'linear-gradient(135deg, #f59e0b 0%, #fbbf24 100%)', // Amber
        'linear-gradient(135deg, #ec4899 0%, #f472b6 100%)', // Pink
        'linear-gradient(135deg, #8b5cf6 0%, #d946ef 100%)', // Purple-Fuchsia
    ];

    document.addEventListener('DOMContentLoaded', async () => {
        // Set default date to today
        const dateInput = document.getElementById('saleDate');
        if (dateInput) {
            dateInput.valueAsDate = new Date();
        }

        await init();
    });

    async function init() {
        allProducts = await api.getProducts();
        renderCategories();
        renderProducts(allProducts);
        renderCart();
        loadPosStats();
    }

    async function loadPosStats() {
        try {
            const stats = await api.getDashboardStats();
            const todaySalesEl = document.getElementById('pos-today-sales');
            const itemsSoldEl = document.getElementById('pos-items-sold');

            if (todaySalesEl) todaySalesEl.textContent = formatCurrency(stats.today_sales);
            if (itemsSoldEl) itemsSoldEl.textContent = stats.items_sold;
        } catch (error) {
            console.error('Error loading PoS stats:', error);
        }
    }

    function renderCategories() {
        const categories = [...new Set(allProducts.map(p => p.category_name || 'Otros'))].sort();
        const container = document.getElementById('categoryFilters');
        if (!container) return;

        // Keep "Todos" and append others
        container.innerHTML = `<div class="category-pill ${activeCategory === 'all' ? 'active' : ''}" onclick="filterByCategory('all')">Todos</div>` +
            categories.map(cat => `
                <div class="category-pill ${activeCategory === cat ? 'active' : ''}" onclick="filterByCategory('${cat}')">${cat}</div>
            `).join('');
    }

    function filterByCategory(category) {
        activeCategory = category;
        renderCategories(); // Re-render to update active state
        filterProducts();
    }

    function getGradient(str) {
        let hash = 0;
        for (let i = 0; i < str.length; i++) {
            hash = str.charCodeAt(i) + ((hash << 5) - hash);
        }
        const index = Math.abs(hash) % gradients.length;
        return gradients[index];
    }

    function renderProducts(products) {
        const container = document.getElementById('productsContainer');
        if (!container) return;

        container.innerHTML = products.map((p, index) => {
            const stockColorClass = p.stock_quantity <= 0 ? 'bg-red-500' : (p.stock_quantity < 5 ? 'bg-yellow-500' : 'bg-green-500');
            const categoryName = p.category_name || 'General';
            const gradient = getGradient(categoryName); // Consistent gradient per category

            return `
            <div class="group relative bg-white rounded-2xl shadow-sm hover:shadow-xl hover:-translate-y-1 transition-all duration-300 cursor-pointer overflow-hidden flex flex-col border border-gray-100" 
                 style="height: 260px;"
                 onclick="addToCart(${p.id})">
                
                <!-- Header with Gradient -->
                <div class="h-16 relative flex items-start justify-between p-3" style="background: ${gradient};">
                    <div class="absolute -bottom-6 -right-6 text-white opacity-20 transform rotate-12">
                        <i class='bx bx-shopping-bag text-6xl'></i>
                    </div>
                    
                    <span class="relative z-10 px-2 py-0.5 rounded-full bg-white/30 text-[10px] text-white font-bold tracking-wider border border-white/40">
                        ${categoryName}
                    </span>

                    <div class="relative z-10 flex items-center gap-1 bg-white px-1.5 py-0.5 rounded-full shadow-sm" title="Stock: ${p.stock_quantity}">
                         <span class="w-2 h-2 rounded-full ${stockColorClass}"></span>
                         <span class="text-[10px] font-bold text-gray-600">${p.stock_quantity}</span>
                    </div>
                </div>
                
                <!-- Body -->
                <div class="p-4 flex-grow flex flex-col justify-between relative">
                    <!-- Cart Badge Overlay -->
                    <div id="badge-${p.id}" class="hidden absolute -top-3 right-3 bg-primary text-white text-xs font-bold px-2 py-1 rounded-full shadow-md border-2 border-white transform scale-0 transition-transform duration-200 z-20">
                        0
                    </div>

                    <h3 class="font-bold text-gray-800 leading-tight line-clamp-2 text-[0.95rem] group-hover:text-primary transition-colors mb-1">
                        ${p.name}
                    </h3>
                    
                    <div class="text-xs text-secondary/80 font-medium mb-1">
                        <i class='bx bx-barcode'></i> ${p.sku}
                    </div>
                    
                    <div class="flex justify-between items-end mt-2">
                        <div class="flex flex-col">
                            <span class="text-[10px] text-gray-400 font-medium uppercase tracking-wider">Precio</span>
                            <span class="font-bold text-gray-900 text-xl tracking-tight group-hover:text-primary transition-colors">${formatCurrency(p.price)}</span>
                        </div>
                        <div class="w-8 h-8 rounded-full bg-gray-50 text-primary border border-gray-100 flex items-center justify-center group-hover:bg-primary group-hover:text-white group-hover:border-primary transition-all shadow-sm group-hover:shadow-md transform group-hover:scale-110">
                            <i class='bx bx-plus text-lg'></i>
                        </div>
                    </div>
                </div>
            </div>
        `}).join('');

        updateProductBadges();
    }

    function updateProductBadges() {
        allProducts.forEach(p => {
            const cartItem = cart.find(c => c.id === p.id);
            const badge = document.getElementById(`badge-${p.id}`);
            if (badge) {
                if (cartItem && cartItem.quantity > 0) {
                    badge.textContent = cartItem.quantity;
                    badge.classList.remove('hidden');
                    // Small delay to allow display:block to apply before scaling
                    requestAnimationFrame(() => {
                        badge.classList.remove('scale-0');
                        badge.classList.add('scale-100');
                    });
                } else {
                    badge.classList.remove('scale-100');
                    badge.classList.add('scale-0');
                    setTimeout(() => badge.classList.add('hidden'), 200);
                }
            }
        });
    }

    function filterProducts() {
        const searchBox = document.getElementById('searchBox');
        if (!searchBox) return;

        const query = searchBox.value.toLowerCase();

        let filtered = allProducts.filter(p =>
            (p.name.toLowerCase().includes(query) || p.sku.toLowerCase().includes(query))
        );

        if (activeCategory !== 'all') {
            filtered = filtered.filter(p => (p.category_name || 'Otros') === activeCategory);
        }

        renderProducts(filtered);
    }

    function addToCart(productId) {
        const product = allProducts.find(p => p.id === productId);
        if (product.stock_quantity <= 0) {
            showToast('¡Sin stock disponible!', 'error');
            return;
        }

        const existing = cart.find(item => item.id === productId);
        if (existing) {
            if (existing.quantity >= product.stock_quantity) {
                showToast('¡Stock máximo alcanzado!', 'warning');
                return;
            }
            existing.quantity++;
        } else {
            cart.push({ ...product, quantity: 1, custom_price: product.price });
        }

        renderCart();
        showToast(`Agregado: ${product.name}`);
    }

    function removeFromCart(productId) {
        cart = cart.filter(item => item.id !== productId);
        renderCart();
    }

    function updateQuantity(productId, change) {
        const item = cart.find(i => i.id === productId);
        if (!item) return;

        const product = allProducts.find(p => p.id === productId);
        const newQuantity = item.quantity + change;

        if (newQuantity <= 0) {
            removeFromCart(productId);
            return;
        }

        if (newQuantity > product.stock_quantity) {
            showToast('¡No hay suficiente stock!', 'warning');
            return;
        }

        item.quantity = newQuantity;
        renderCart();
    }

    function updatePrice(productId, newPrice) {
        const item = cart.find(i => i.id === productId);
        if (!item) return;

        item.custom_price = parseFloat(newPrice);
        renderCart();
    }

    function renderCart() {
        updateProductBadges(); // Update badges whenever cart changes

        const container = document.getElementById('cartItems');
        if (!container) return;

        if (cart.length === 0) {
            container.innerHTML = '<div class="text-center text-secondary mt-2" style="padding: 2rem; opacity: 0.7;"><i class="bx bx-cart" style="font-size: 3rem; margin-bottom: 1rem;"></i><br>El carrito está vacío</div>';
            const totalEl = document.getElementById('cartTotal');
            const subtotalEl = document.getElementById('cartSubtotal');
            if (totalEl) totalEl.innerText = 'Bs 0.00';
            if (subtotalEl) subtotalEl.innerText = 'Bs 0.00';
            return;
        }

        let total = 0;
        container.innerHTML = cart.map(item => {
            const itemTotal = (item.custom_price || item.price) * item.quantity;
            total += itemTotal;
            return `
                <div class="cart-item">
                    <div class="flex justify-between items-start mb-2">
                        <div>
                            <h4 style="font-size: 0.95rem; margin-bottom: 0.25rem;">${item.name} <span class="text-xs text-secondary">(${item.sku})</span></h4>
                            <div class="flex items-center gap-2">
                                <span class="text-secondary" style="font-size: 0.85rem;">Bs</span>
                                <input type="number" step="0.01" value="${item.custom_price || item.price}" 
                                    onchange="updatePrice(${item.id}, this.value)"
                                    class="seamless-input" style="width: 80px; padding: 2px 5px; border: 1px solid var(--border-color); border-radius: 4px;"
                                >
                            </div>
                        </div>
                        <button onclick="removeFromCart(${item.id})" style="background:none; border:none; color:var(--text-light); cursor:pointer;">
                            <i class='bx bx-x' style="font-size: 1.2rem;"></i>
                        </button>
                    </div>

                    <div class="flex justify-between items-center">
                        <div class="qty-controls" style="display: flex; align-items: center; gap: 0.5rem;">
                            <button onclick="updateQuantity(${item.id}, -1)" class="btn-qty"><i class='bx bx-minus'></i></button>
                            <span class="qty-display" style="font-weight: 600; min-width: 20px; text-align: center;">${item.quantity}</span>
                            <button onclick="updateQuantity(${item.id}, 1)" class="btn-qty"><i class='bx bx-plus'></i></button>
                        </div>
                        <span style="font-weight: 600; color: var(--text-primary);">${formatCurrency(itemTotal)}</span>
                    </div>
                </div>
            `;
        }).join('');

        const formattedTotal = formatCurrency(total);
        const totalEl = document.getElementById('cartTotal');
        const subtotalEl = document.getElementById('cartSubtotal');
        if (totalEl) totalEl.innerText = formattedTotal;
        if (subtotalEl) subtotalEl.innerText = formattedTotal;
    }

    function showToast(message, type = 'success') {
        const container = document.getElementById('toastContainer');
        if (!container) return;

        const toast = document.createElement('div');
        toast.className = 'toast';

        let icon = 'bx-check-circle';
        if (type === 'error') icon = 'bx-x-circle';
        if (type === 'warning') icon = 'bx-error-circle';

        toast.innerHTML = `<i class='bx ${icon}'></i> ${message}`;
        container.appendChild(toast);

        setTimeout(() => {
            toast.style.opacity = '0';
            toast.style.transform = 'translateY(20px)';
            setTimeout(() => toast.remove(), 300);
        }, 3000);
    }

    async function processCheckout() {
        if (cart.length === 0) return;

        const dateInput = document.getElementById('saleDate');
        const date = dateInput ? dateInput.value : new Date().toISOString().split('T')[0];

        try {
            await api.checkout(cart.map(item => ({
                id: item.id,
                quantity: item.quantity,
                custom_price: item.custom_price
            })), date);

            showToast('¡Venta completada con éxito!');
            cart = [];
            renderCart();
            init(); // Reload products to update stock
        } catch (err) {
            showToast('Error en el pago: ' + err.message, 'error');
        }
    }
</script>
{% endblock %}
