{% extends "base.html" %}

{% block title %}Punto de Venta{% endblock %}

{% block content %}
<div class="pos-layout">
    <!-- Product Selection -->
    <div class="product-grid">
        <div class="form-group">
            <input type="text" id="searchBox" placeholder="Buscar productos por nombre o SKU..."
                onkeyup="filterProducts()">
        </div>
        <div id="productsContainer" class="grid-container">
            <!-- Products injected here -->
        </div>
    </div>

    <!-- Cart -->
    <div class="cart-panel">
        <h2>Venta Actual</h2>
        <div class="cart-items" id="cartItems">
            <!-- Cart items injected here -->
            <div class="text-center text-secondary mt-2">El carrito está vacío</div>
        </div>
        <div class="cart-total">
            Total: <span id="cartTotal">$0.00</span>
        </div>
        <button onclick="processCheckout()" class="btn btn-primary mt-2" style="width: 100%">Pagar</button>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    let allProducts = [];
    let cart = [];

    async function init() {
        allProducts = await api.getProducts();
        renderProducts(allProducts);
        renderCart();
    }

    function renderProducts(products) {
        const container = document.getElementById('productsContainer');
        container.innerHTML = products.map((p, index) => `
            <div class="card" onclick="addToCart(${p.id})" style="cursor: pointer; animation: fadeIn 0.5s ease forwards; animation-delay: ${index * 0.05}s; opacity: 0;">
                <div style="height: 120px; background: var(--bg-gradient); border-radius: var(--radius-sm); margin-bottom: 1rem; display: flex; align-items: center; justify-content: center; color: var(--primary-color);">
                    <i class='bx bxs-package' style="font-size: 3rem; opacity: 0.5;"></i>
                </div>
                <h4>${p.name}</h4>
                <p class="text-secondary" style="font-size: 0.9rem; margin-bottom: 0.5rem;">${p.sku}</p>
                <div class="flex justify-between items-center mt-2">
                    <span style="background: var(--surface-hover); padding: 0.25rem 0.5rem; border-radius: 4px; font-size: 0.85rem;">${p.size || '-'} ${p.color || ''}</span>
                    <span style="font-weight: 800; color: var(--primary-color); font-size: 1.1rem;">${formatCurrency(p.price)}</span>
                </div>
                <div style="margin-top: 0.75rem; font-size: 0.85rem; color: ${p.stock_quantity < 5 ? 'var(--error-color)' : 'var(--text-secondary)'}; display: flex; align-items: center; gap: 0.25rem;">
                    <i class='bx ${p.stock_quantity < 5 ? 'bxs-error-circle' : 'bxs-check-circle'}'></i>
                    Stock: ${p.stock_quantity}
                </div>
            </div>
        `).join('');
    }

    function filterProducts() {
        const query = document.getElementById('searchBox').value.toLowerCase();
        const filtered = allProducts.filter(p =>
            p.name.toLowerCase().includes(query) ||
            p.sku.toLowerCase().includes(query)
        );
        renderProducts(filtered);
    }

    function addToCart(productId) {
        const product = allProducts.find(p => p.id === productId);
        if (product.stock_quantity <= 0) {
            alert('¡Sin stock!');
            return;
        }

        const existing = cart.find(item => item.id === productId);
        if (existing) {
            if (existing.quantity >= product.stock_quantity) {
                alert('¡No hay suficiente stock!');
                return;
            }
            existing.quantity++;
        } else {
            cart.push({ ...product, quantity: 1 });
        }
        renderCart();
    }

    function removeFromCart(productId) {
        cart = cart.filter(item => item.id !== productId);
        renderCart();
    }

    function updateQuantity(productId, change) {
        const item = cart.find(i => i.id === productId);
        if (!item) return;

        const product = allProducts.find(p => p.id === productId);
        const newQuantity = item.quantity + change;

        if (newQuantity <= 0) {
            removeFromCart(productId);
            return;
        }

        if (newQuantity > product.stock_quantity) {
            alert('¡No hay suficiente stock!');
            return;
        }

        item.quantity = newQuantity;
        renderCart();
    }

    function renderCart() {
        const container = document.getElementById('cartItems');
        if (cart.length === 0) {
            container.innerHTML = '<div class="text-center text-secondary mt-2" style="padding: 2rem; opacity: 0.7;"><i class="bx bx-cart" style="font-size: 3rem; margin-bottom: 1rem;"></i><br>El carrito está vacío</div>';
            document.getElementById('cartTotal').innerText = '$0.00';
            return;
        }

        let total = 0;
        container.innerHTML = cart.map(item => {
            total += item.price * item.quantity;
            return `
                <div class="cart-item">
                    <div style="display: flex; align-items: center; gap: 1rem;">
                        <div style="width: 40px; height: 40px; background: var(--bg-gradient); border-radius: 8px; display: flex; align-items: center; justify-content: center; color: var(--primary-color);">
                            <i class='bx bxs-package'></i>
                        </div>
                        <div>
                            <strong>${item.name}</strong><br>
                            <small class="text-secondary">${formatCurrency(item.price)} c/u</small>
                        </div>
                    </div>
                    <div class="cart-item-controls">
                        <button onclick="updateQuantity(${item.id}, -1)" class="btn-qty"><i class='bx bx-minus'></i></button>
                        <span style="font-weight: 600; min-width: 24px; text-align: center;">${item.quantity}</span>
                        <button onclick="updateQuantity(${item.id}, 1)" class="btn-qty"><i class='bx bx-plus'></i></button>
                        <button onclick="removeFromCart(${item.id})" class="btn btn-danger" style="width: 32px; height: 32px; padding: 0; border-radius: 8px; margin-left: 0.5rem;"><i class='bx bx-trash'></i></button>
                    </div>
                </div>
            `;
        }).join('');

        document.getElementById('cartTotal').innerText = formatCurrency(total);
    }

    async function processCheckout() {
        if (cart.length === 0) return;

        try {
            await api.checkout(cart.map(item => ({ id: item.id, quantity: item.quantity })));
            alert('¡Venta completada con éxito!');
            cart = [];
            renderCart();
            init(); // Reload products to update stock
        } catch (err) {
            alert('Error en el pago: ' + err.message);
        }
    }

    init();
</script>
{% endblock %}
