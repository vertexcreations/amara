{% extends "base.html" %}

{% block title %}Inventario{% endblock %}

{% block content %}
<div class="flex flex-col h-full" style="height: calc(100vh - 80px);">
    <!-- Top Toolbar: Simplified Header -->
    <div class="flex justify-between items-end mb-2 px-1" style="flex-shrink: 0;">
        <div class="flex gap-6 items-center">
            <h2 class="m-0 text-primary font-bold text-lg flex items-center gap-2">
                <i class='bx bx-box'></i> Inventario
            </h2>

            <!-- Compact Stats (Lighter) -->
            <div class="flex gap-4 text-xs text-gray-500">
                <div class="flex items-center gap-1.5">
                    <span class="uppercase tracking-wider opacity-70">Costo</span>
                    <span id="totalCostValue" class="font-semibold text-gray-700">Bs 0.00</span>
                </div>
                <div class="h-4 w-px bg-gray-200"></div>
                <div class="flex items-center gap-1.5">
                    <span class="uppercase tracking-wider opacity-70">Venta</span>
                    <span id="totalSaleValue" class="font-semibold text-gray-700">Bs 0.00</span>
                </div>
                <div class="h-4 w-px bg-gray-200"></div>
                <div class="flex items-center gap-1.5">
                    <span class="uppercase tracking-wider opacity-70">Ganancia</span>
                    <span id="totalProfitValue" class="font-bold text-success">Bs 0.00</span>
                </div>
            </div>
        </div>

        <div class="flex gap-2">
            <!-- Search & Filter -->
            <div class="relative">
                <i class='bx bx-search absolute left-2 top-1/2 transform -translate-y-1/2 text-gray-400'></i>
                <input type="text" id="searchInput" onkeyup="filterTable()" placeholder="Buscar..."
                    class="pl-8 pr-3 py-1 text-sm border border-gray-200 rounded-md focus:ring-1 focus:ring-primary focus:border-primary w-40 transition-all bg-white shadow-sm">
            </div>

            <select id="categoryFilter" onchange="filterTable()"
                class="py-1 px-3 text-sm border border-gray-200 rounded-md focus:ring-1 focus:ring-primary focus:border-primary bg-white cursor-pointer hover:bg-gray-50 transition-colors shadow-sm">
                <option value="">Todas</option>
                <!-- Populated by JS -->
            </select>

            <button onclick="openModal()" class="btn btn-primary py-1 px-3 text-sm shadow-sm hover:shadow-md transition-all flex items-center gap-1"><i class='bx bx-plus'></i> <span class="hidden sm:inline">Nuevo</span></button>
        </div>
    </div>

    <!-- Data Table -->
    <div class="card p-0 overflow-hidden flex-grow flex flex-col bg-white shadow-sm rounded-lg border border-gray-200">
        <div class="overflow-auto flex-grow custom-scrollbar">
            <table class="w-full text-sm">
                <thead class="sticky top-0 bg-gray-50 z-10 border-b border-gray-200">
                    <tr class="text-xs text-gray-500 uppercase tracking-wider">
                        <th class="py-2 px-3 font-semibold" width="10%">SKU</th>
                        <th class="py-2 px-3 font-semibold" width="30%">Producto</th>
                        <th class="py-2 px-3 font-semibold" width="15%">Categoría</th>
                        <th class="py-2 px-3 font-semibold text-right" width="10%">Costo</th>
                        <th class="py-2 px-3 font-semibold text-right" width="10%">Precio</th>
                        <th class="py-2 px-3 font-semibold text-center" width="10%">Stock</th>
                        <th class="py-2 px-3 font-semibold text-center" width="7%">Acciones</th>
                    </tr>
                </thead>
                <tbody id="productTableBody" class="divide-y divide-gray-100">
                    <!-- Populated by JS -->
                </tbody>
            </table>
        </div>
        <!-- Footer / Count -->
        <div
            class="py-1.5 px-3 border-t border-gray-200 text-xs text-gray-500 flex justify-between items-center bg-gray-50">
            <span>Total registros: <span id="showingCount" class="font-medium text-gray-700">0</span></span>
        </div>
    </div>
</div>

<!-- Add/Edit Product Modal -->
<div id="productModal"
    class="modal fixed inset-0 z-50 flex items-center justify-center bg-black bg-opacity-50 hidden opacity-0 transition-opacity duration-300">
    <div
        class="modal-content bg-white rounded-xl shadow-2xl w-full max-w-2xl transform scale-95 transition-transform duration-300 p-6">
        <div class="flex justify-between items-center mb-5 border-b border-gray-100 pb-3">
            <h2 id="modalTitle" class="text-xl font-bold text-gray-800">Nuevo Producto</h2>
            <button onclick="closeModal()" class="text-gray-400 hover:text-gray-600 transition-colors">
                <i class='bx bx-x text-2xl'></i>
            </button>
        </div>

        <form id="productForm" class="space-y-4">
            <input type="hidden" name="id">

            <div class="grid grid-cols-12 gap-4">
                <!-- Main Info -->
                <div class="col-span-8 space-y-4">
                    <div class="form-group">
                        <label class="text-xs font-semibold text-gray-500 uppercase mb-1">Nombre del Producto</label>
                        <input type="text" name="name" required placeholder="Ej. Coca Cola 2L"
                            class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent transition-all">
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div class="form-group">
                            <label class="text-xs font-semibold text-gray-500 uppercase mb-1">SKU / Código</label>
                            <input type="text" name="sku" required placeholder="Ej. 777123..."
                                class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent transition-all">
                        </div>
                        <div class="form-group">
                            <label class="text-xs font-semibold text-gray-500 uppercase mb-1">Categoría</label>
                            <select name="category_id" id="categorySelect" required
                                class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent transition-all">
                                <option value="">Seleccionar...</option>
                            </select>
                        </div>
                    </div>
                </div>

                <!-- Pricing & Stock Panel -->
                <div class="col-span-4 bg-gray-50 p-4 rounded-lg border border-gray-100 space-y-3">
                    <div class="form-group">
                        <label class="text-xs font-semibold text-gray-500 uppercase mb-1">Costo (Bs)</label>
                        <input type="number" step="0.01" name="cost_price" required onchange="calculateMargin()"
                            class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent transition-all text-right">
                    </div>
                    <div class="form-group">
                        <label class="text-xs font-semibold text-gray-500 uppercase mb-1">Precio Venta (Bs)</label>
                        <input type="number" step="0.01" name="price" required onchange="calculateMargin()"
                            class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent transition-all text-right font-bold text-gray-800">
                    </div>
                    <div class="form-group">
                        <label class="text-xs font-semibold text-gray-500 uppercase mb-1">Stock Actual</label>
                        <input type="number" name="stock_quantity" required
                            class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent transition-all text-center">
                    </div>
                </div>
            </div>

            <div class="flex justify-end gap-3 pt-4 border-t border-gray-100 mt-2">
                <button type="button" onclick="closeModal()"
                    class="px-4 py-2 text-sm font-medium text-gray-600 bg-white border border-gray-300 rounded-lg hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-gray-500 transition-all">Cancelar</button>
                <button type="submit"
                    class="px-4 py-2 text-sm font-medium text-white bg-primary rounded-lg hover:bg-primary-hover focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary shadow-lg shadow-primary/30 transition-all">Guardar
                    Producto</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    const modal = document.getElementById('productModal');
    const form = document.getElementById('productForm');
    const tableBody = document.getElementById('productTableBody');
    const categorySelect = document.getElementById('categorySelect');
    const categoryFilter = document.getElementById('categoryFilter');

    let allProducts = [];
    let allCategories = [];

    function openModal(product = null) {
        modal.classList.remove('hidden');
        // Trigger reflow
        void modal.offsetWidth;
        modal.classList.remove('opacity-0');
        modal.classList.add('active');

        const title = document.getElementById('modalTitle');

        if (product) {
            title.textContent = 'Editar Producto';
            form.id.value = product.id;
            form.name.value = product.name;
            form.sku.value = product.sku;
            form.category_id.value = product.category_id || '';
            form.cost_price.value = product.cost_price;
            form.price.value = product.price;
            form.stock_quantity.value = product.stock_quantity;
        } else {
            title.textContent = 'Nuevo Producto';
            form.reset();
            form.id.value = '';
        }
        calculateMargin();
    }

    function closeModal() {
        modal.classList.add('opacity-0');
        setTimeout(() => {
            modal.classList.add('hidden');
            modal.classList.remove('active');
        }, 300);
    }

    function calculateMargin() {
        // Margin calculation logic kept for internal use if needed, but UI removed
        const cost = parseFloat(form.cost_price.value) || 0;
        const price = parseFloat(form.price.value) || 0;
    }

    async function loadData() {
        try {
            const [products, categories] = await Promise.all([
                api.getProducts(),
                api.getCategories()
            ]);

            allProducts = products;
            allCategories = categories;

            // Populate Categories
            const catOptions = '<option value="">Seleccionar...</option>' +
                categories.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
            categorySelect.innerHTML = catOptions;

            const filterOptions = '<option value="">Todas las Categorías</option>' +
                categories.map(c => `<option value="${c.name}">${c.name}</option>`).join('');
            categoryFilter.innerHTML = filterOptions;

            renderTable(allProducts);
            updateStats(allProducts);
        } catch (error) {
            console.error("Error loading data:", error);
        }
    }

    function updateStats(products) {
        let totalCost = 0;
        let totalPrice = 0;

        products.forEach(p => {
            const stock = p.stock_quantity || 0;
            totalCost += (p.cost_price || 0) * stock;
            totalPrice += (p.price || 0) * stock;
        });

        document.getElementById('totalCostValue').textContent = formatCurrency(totalCost);
        document.getElementById('totalSaleValue').textContent = formatCurrency(totalPrice);
        document.getElementById('totalProfitValue').textContent = formatCurrency(totalPrice - totalCost);
    }

    function renderTable(products) {
        document.getElementById('showingCount').textContent = products.length;

        if (products.length === 0) {
            tableBody.innerHTML = `<tr><td colspan="8" class="text-center py-8 text-secondary">
                <div class="flex flex-col items-center justify-center gap-2">
                    <i class='bx bx-box text-4xl text-gray-300'></i>
                    <p>No se encontraron productos</p>
                </div>
            </td></tr>`;
            return;
        }

        tableBody.innerHTML = products.map(p => {
            const margin = p.price > 0 ? ((p.price - p.cost_price) / p.price) * 100 : 0;
            const stockClass = p.stock_quantity <= 0 ? 'bg-red-100 text-red-800' : (p.stock_quantity < 5 ? 'bg-yellow-100 text-yellow-800' : 'bg-green-100 text-green-800');

            return `
            <tr class="hover:bg-gray-50 transition-colors group">
                <td class="py-2 px-3 font-mono text-xs text-secondary">${p.sku}</td>
                <td class="py-2 px-3 font-medium text-gray-800">${p.name}</td>
                <td class="py-2 px-3"><span class="px-2 py-0.5 rounded-full text-xs bg-gray-100 text-gray-600 border border-gray-200">${p.category_name || 'Sin Cat.'}</span></td>
                <td class="py-2 px-3 text-right text-secondary text-xs">${formatCurrency(p.cost_price || 0)}</td>
                <td class="py-2 px-3 text-right font-bold text-gray-800">${formatCurrency(p.price)}</td>
                <td class="py-2 px-3 text-center">
                    <span class="px-2 py-0.5 rounded-full text-xs font-bold ${stockClass}">${p.stock_quantity}</span>
                </td>

                <td class="py-2 px-3 text-center">
                    <div class="flex justify-center gap-1">
                        <button onclick='editProduct(${JSON.stringify(p).replace(/'/g, "&#39;")})' class="p-1 text-primary hover:bg-blue-50 rounded transition-colors" title="Editar">
                            <i class='bx bx-edit-alt'></i>
                        </button>
                        <button onclick="deleteProduct(${p.id})" class="p-1 text-danger hover:bg-red-50 rounded transition-colors" title="Eliminar">
                            <i class='bx bx-trash'></i>
                        </button>
                    </div>
                </td>
            </tr>
        `}).join('');
    }

    function filterTable() {
        const query = document.getElementById('searchInput').value.toLowerCase();
        const cat = document.getElementById('categoryFilter').value;

        const filtered = allProducts.filter(p => {
            const matchesSearch = p.name.toLowerCase().includes(query) || p.sku.toLowerCase().includes(query);
            const matchesCat = cat === "" || (p.category_name || "") === cat;
            return matchesSearch && matchesCat;
        });

        renderTable(filtered);
    }

    function editProduct(product) {
        openModal(product);
    }

    form.onsubmit = async (e) => {
        e.preventDefault();
        const formData = new FormData(e.target);
        const product = Object.fromEntries(formData.entries());
        const id = product.id;

        // Convert types
        product.price = parseFloat(product.price);
        product.cost_price = parseFloat(product.cost_price || 0);
        product.stock_quantity = parseInt(product.stock_quantity);
        product.category_id = product.category_id ? parseInt(product.category_id) : null;
        delete product.id; // Remove ID from body

        try {
            if (id) {
                await api.updateProduct(id, product);
            } else {
                await api.addProduct(product);
            }
            closeModal();
            loadData();
        } catch (err) {
            console.error(err);
            alert('Error al guardar producto');
        }
    };

    async function deleteProduct(id) {
        if (confirm('¿Estás seguro de eliminar este producto?')) {
            try {
                await api.deleteProduct(id);
                loadData();
            } catch (err) {
                alert('Error al eliminar');
            }
        }
    }

    // Initial Load
    loadData();
</script>
{% endblock %}
