{% extends "base.html" %}

{% block title %}Gestión de Inventario{% endblock %}

{% block content %}
<div class="card">
    <style>
        .filter-input {
            width: 100%;
            padding: 0.4rem 0.6rem;
            border: 1px solid #e2e8f0;
            border-radius: 6px;
            font-size: 0.85rem;
            font-weight: normal;
            margin-top: 0.25rem;
        }

        .filter-input:focus {
            outline: none;
            border-color: #6366f1;
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
        }
    </style>
    <div class="flex justify-between items-center mb-2">
        <h2>Productos</h2>
        <button onclick="openModal()" class="btn btn-primary">+ Agregar Producto</button>
    </div>
    <table>
        <thead>
            <tr>
                <th>SKU</th>
                <th>Nombre</th>
                <th>Categoría</th>
                <th>Talla</th>
                <th>Color</th>
                <th>Precio</th>
                <th>Stock</th>
                <th>Acciones</th>
            </tr>
            <tr id="filterRow">
                <th><input type="text" onkeyup="applyFilters()" placeholder="SKU" class="filter-input"></th>
                <th><input type="text" onkeyup="applyFilters()" placeholder="Nombre" class="filter-input"></th>
                <th><input type="text" onkeyup="applyFilters()" placeholder="Cat" class="filter-input"></th>
                <th><input type="text" onkeyup="applyFilters()" placeholder="Talla" class="filter-input"></th>
                <th><input type="text" onkeyup="applyFilters()" placeholder="Color" class="filter-input"></th>
                <th><input type="text" onkeyup="applyFilters()" placeholder="Precio" class="filter-input"></th>
                <th><input type="text" onkeyup="applyFilters()" placeholder="Stock" class="filter-input"></th>
                <th></th>
            </tr>
        </thead>
        <tbody id="productTableBody">
            <!-- Populated by JS -->
        </tbody>
    </table>
</div>

<!-- Add Product Modal -->
<div id="addProductModal" class="modal">
    <div class="modal-content">
        <h2>Agregar Nuevo Producto</h2>
        <form id="addProductForm" class="mt-2">
            <div class="form-group">
                <label>Nombre</label>
                <input type="text" name="name" required>
            </div>
            <div class="flex">
                <div class="form-group" style="flex:1">
                    <label>SKU</label>
                    <input type="text" name="sku" required>
                </div>
                <div class="form-group" style="flex:1">
                    <label>Categoría</label>
                    <select name="category_id" id="categorySelect" required>
                        <option value="">Seleccionar...</option>
                        <!-- Populated by JS -->
                    </select>
                </div>
            </div>
            <div class="flex">
                <div class="form-group" style="flex:1">
                    <label>Talla</label>
                    <select name="size">
                        <option value="XS">XS</option>
                        <option value="S">S</option>
                        <option value="M">M</option>
                        <option value="L">L</option>
                        <option value="XL">XL</option>
                    </select>
                </div>
                <div class="form-group" style="flex:1">
                    <label>Color</label>
                    <input type="text" name="color">
                </div>
            </div>
            <div class="flex">
                <div class="form-group" style="flex:1">
                    <label>Precio</label>
                    <input type="number" step="0.01" name="price" required>
                </div>
                <div class="form-group" style="flex:1">
                    <label>Stock</label>
                    <input type="number" name="stock_quantity" required>
                </div>
            </div>
            <div class="flex justify-between mt-2">
                <button type="button" onclick="closeModal()" class="btn btn-secondary">Cancelar</button>
                <button type="submit" class="btn btn-primary">Guardar Producto</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    const modal = document.getElementById('addProductModal');
    const tableBody = document.getElementById('productTableBody');
    const categorySelect = document.getElementById('categorySelect');

    function openModal() { modal.classList.add('active'); }
    function closeModal() { modal.classList.remove('active'); }

    async function loadData() {
        const [products, categories] = await Promise.all([
            api.getProducts(),
            api.getCategories()
        ]);

        // Populate Categories Dropdown
        categorySelect.innerHTML = '<option value="">Seleccionar...</option>' +
            categories.map(c => `<option value="${c.id}">${c.name}</option>`).join('');

        // Populate Product Table
        tableBody.innerHTML = products.map(p => `
            <tr>
                <td>${p.sku}</td>
                <td>${p.name}</td>
                <td>${p.category_name || '-'}</td>
                <td>${p.size || '-'}</td>
                <td>${p.color || '-'}</td>
                <td>${formatCurrency(p.price)}</td>
                <td>${p.stock_quantity}</td>
                <td>
                    <button onclick="deleteProduct(${p.id})" class="btn btn-danger" style="padding: 0.25rem 0.5rem; font-size: 0.8rem;">Eliminar</button>
                </td>
            </tr>
        `).join('');
    }

    document.getElementById('addProductForm').onsubmit = async (e) => {
        e.preventDefault();
        const formData = new FormData(e.target);
        const product = Object.fromEntries(formData.entries());

        try {
            await api.addProduct(product);
            closeModal();
            e.target.reset();
            loadData();
        } catch (err) {
            alert('Error al agregar producto');
        }
    };

    async function deleteProduct(id) {
        if (confirm('¿Estás seguro?')) {
            await api.deleteProduct(id);
            loadData();
        }
    }

    function applyFilters() {
        const inputs = document.querySelectorAll('#filterRow input');
        const rows = document.getElementById('productTableBody').getElementsByTagName('tr');

        for (let i = 0; i < rows.length; i++) {
            let show = true;
            for (let j = 0; j < inputs.length; j++) {
                const filterText = inputs[j].value.toLowerCase();
                if (filterText) {
                    const cell = rows[i].getElementsByTagName('td')[j];
                    if (cell) {
                        const cellText = (cell.textContent || cell.innerText).toLowerCase();
                        if (cellText.indexOf(filterText) === -1) {
                            show = false;
                            break;
                        }
                    }
                }
            }
            rows[i].style.display = show ? "" : "none";
        }
    }

    loadData();
</script>
{% endblock %}
